version: "3.8"

services:
  # ── Qdrant Vector Database ──
  qdrant:
    image: qdrant/qdrant:v1.14.2
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rag_enterprise
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag_secret_2026
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_enterprise"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: rag-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - rag-backend
    restart: unless-stopped

volumes:
  qdrant_data:
  pg_data:
