<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG 知识库问答</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
  .header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 18px; color: #333; }
  .header .badge { font-size: 12px; background: #e6f7ff; color: #1890ff; padding: 2px 8px; border-radius: 4px; }
  .chat-box { flex: 1; overflow-y: auto; padding: 24px; }
  .msg { margin-bottom: 16px; display: flex; gap: 12px; max-width: 85%; }
  .msg.user { margin-left: auto; flex-direction: row-reverse; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .msg.bot .avatar { background: #1890ff; color: #fff; }
  .msg.user .avatar { background: #52c41a; color: #fff; }
  .bubble { padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.bot .bubble { background: #fff; color: #333; border: 1px solid #e8e8e8; }
  .msg.user .bubble { background: #1890ff; color: #fff; }
  .sources { margin-top: 8px; padding: 8px 12px; background: #fafafa; border-radius: 8px; font-size: 12px; color: #888; border: 1px solid #f0f0f0; }
  .sources span { color: #1890ff; }
  .confidence { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 3px; margin-left: 8px; }
  .confidence.high { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
  .confidence.low { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
  .input-bar { background: #fff; padding: 16px 24px; border-top: 1px solid #e8e8e8; display: flex; gap: 12px; }
  .input-bar input { flex: 1; padding: 10px 16px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; outline: none; transition: border-color .2s; }
  .input-bar input:focus { border-color: #1890ff; }
  .input-bar button { padding: 10px 24px; background: #1890ff; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: background .2s; }
  .input-bar button:hover { background: #40a9ff; }
  .input-bar button:disabled { background: #d9d9d9; cursor: not-allowed; }
  .loading { display: none; padding: 12px 16px; }
  .loading.show { display: flex; gap: 4px; align-items: center; }
  .loading .dot { width: 8px; height: 8px; background: #1890ff; border-radius: 50%; animation: bounce .6s infinite alternate; }
  .loading .dot:nth-child(2) { animation-delay: .2s; }
  .loading .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { to { transform: translateY(-8px); opacity: .3; } }
  .welcome { text-align: center; color: #999; margin-top: 30vh; }
  .welcome h2 { font-size: 20px; color: #333; margin-bottom: 8px; }
  .welcome p { font-size: 14px; }
</style>
</head>
<body>
<div class="header">
  <h1>RAG 知识库问答</h1>
  <span class="badge">Enterprise</span>
</div>
<div class="chat-box" id="chatBox">
  <div class="welcome" id="welcome">
    <h2>你好！我是知识库问答助手</h2>
    <p>输入问题开始查询，我会从知识库中检索相关文档并回答</p>
  </div>
</div>
<div class="loading" id="loading">
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  <span style="font-size:12px;color:#999;margin-left:8px;">正在检索和生成回答...</span>
</div>
<div class="input-bar">
  <input type="text" id="queryInput" placeholder="输入你的问题..." autofocus>
  <button id="sendBtn" onclick="send()">发送</button>
</div>

<script>
const API = '/api/query-sync';
const chatBox = document.getElementById('chatBox');
const input = document.getElementById('queryInput');
const sendBtn = document.getElementById('sendBtn');
const loading = document.getElementById('loading');
const welcome = document.getElementById('welcome');

input.addEventListener('keydown', e => { if (e.key === 'Enter' && !sendBtn.disabled) send(); });

async function send() {
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  sendBtn.disabled = true;
  if (welcome) welcome.remove();

  // user message
  appendMsg('user', q);

  // loading
  loading.classList.add('show');
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const resp = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    const data = await resp.json();

    loading.classList.remove('show');

    let html = data.answer || '未能获取到回答';
    if (data.sources && data.sources.length) {
      const files = [...new Set(data.sources.map(s => s.file_name).filter(Boolean))];
      if (files.length) {
        html += `<div class="sources">引用来源：<span>${files.join('</span>、<span>')}</span>`;
        if (data.confidence) {
          html += `<span class="confidence ${data.confidence}">${data.confidence === 'high' ? '高置信' : '低置信'}</span>`;
        }
        html += '</div>';
      }
    }
    appendMsg('bot', html, true);
  } catch (err) {
    loading.classList.remove('show');
    appendMsg('bot', '请求失败：' + err.message);
  }
  sendBtn.disabled = false;
  input.focus();
}

function appendMsg(role, content, isHtml) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'bot' ? '📚' : '👤';
  div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${isHtml ? content : escHtml(content)}</div>`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
